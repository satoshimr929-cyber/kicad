<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiCad Schematic Viewer / Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-group">
      <strong class="brand">KiCad SCH Viewer</strong>
    </div>
    <div class="toolbar-group">
      <label class="btn" for="fileInput">開く…</label>
      <input id="fileInput" type="file" accept=".kicad_sch,.sch" hidden>
      <button id="sampleBtn" class="btn">サンプル</button>
      <button id="saveBtn" class="btn" disabled>保存 (.kicad_sch)</button>
    </div>
    <div class="toolbar-group">
      <button id="fitBtn" class="btn" disabled>全体表示</button>
      <button id="zoomInBtn" class="btn" disabled>＋</button>
      <button id="zoomOutBtn" class="btn" disabled>－</button>
      <label class="check"><input id="gridChk" type="checkbox" checked> グリッド</label>
    </div>
    <div class="toolbar-group grow">
      <span id="fileName" class="filename">ファイル未読み込み</span>
      <span id="dirtyFlag" class="dirty" hidden>● 未保存</span>
    </div>
  </header>

  <main class="workspace">
    <div id="canvasWrap" class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="dropHint" class="drop-hint">
        <div>
          <p><strong>.kicad_sch</strong> ファイルをここにドロップ</p>
          <p>または「開く…」／「サンプル」ボタン</p>
        </div>
      </div>
      <div id="coords" class="coords"></div>
    </div>

    <aside id="sidebar" class="sidebar">
      <div id="sidebarHeader" class="sidebar-header">
        <span class="sheet-handle" aria-hidden="true"></span>
        <span>プロパティ</span>
        <span class="sheet-chevron" aria-hidden="true"></span>
      </div>
      <div id="propContent" class="prop-content">
        <p class="hint">シンボルをクリックして選択すると、ここでプロパティを編集できます。</p>
      </div>
    </aside>
  </main>

  <script src="js/sexpr.js"></script>
  <script src="js/model.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/sample.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
