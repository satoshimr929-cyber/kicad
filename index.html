<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiCad Schematic Viewer / Editor</title>
  <meta name="theme-color" content="#1e2a36">
  <meta name="build" content="dev">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KiCad SCH">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-group">
      <strong class="brand">KiCad SCH Viewer</strong>
    </div>
    <div class="toolbar-group">
      <label class="btn" for="fileInput">開く…</label>
      <input id="fileInput" type="file" accept=".kicad_sch,.sch" hidden>
      <button id="sampleBtn" class="btn">サンプル</button>
      <button id="saveBtn" class="btn" disabled>保存 (.kicad_sch)</button>
    </div>
    <div class="toolbar-group">
      <button id="undoBtn" class="btn" disabled title="元に戻す (Ctrl+Z)">↩ 元に戻す</button>
      <button id="redoBtn" class="btn" disabled title="やり直す (Ctrl+Y)">↪ やり直す</button>
    </div>
    <div class="toolbar-group">
      <button id="fitBtn" class="btn" disabled>全体表示</button>
      <button id="zoomInBtn" class="btn" disabled>＋</button>
      <button id="zoomOutBtn" class="btn" disabled>－</button>
      <label class="check"><input id="gridChk" type="checkbox" checked> グリッド</label>
      <button id="fieldsBtn" class="btn" disabled>表示項目…</button>
    </div>
    <div class="toolbar-group grow">
      <span id="fileName" class="filename">ファイル未読み込み</span>
      <span id="dirtyFlag" class="dirty" hidden>● 未保存</span>
    </div>
  </header>

  <div class="toolbar tools" id="toolsBar">
    <button class="btn tool active" data-tool="select">選択</button>
    <button class="btn" id="partBtn">部品を配置…</button>
    <button class="btn tool" data-tool="wire">配線</button>
    <button class="btn tool" data-tool="bus">バス</button>
    <button class="btn tool" data-tool="label">ラベル</button>
    <button class="btn tool" data-tool="global_label">グローバル</button>
    <button class="btn tool" data-tool="power">電源</button>
    <select id="powerSel" class="btn" title="配置する電源シンボル">
      <option value="power:GND">GND</option>
      <option value="power:+5V">+5V</option>
      <option value="power:+3V3">+3V3</option>
      <option value="power:+12V">+12V</option>
      <option value="power:VCC">VCC</option>
    </select>
    <button class="btn tool" data-tool="junction">ジャンクション</button>
    <button class="btn tool" data-tool="no_connect">NC</button>
    <button class="btn tool" data-tool="text">テキスト</button>
  </div>

  <main class="workspace">
    <div id="canvasWrap" class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="dropHint" class="drop-hint">
        <div>
          <p><strong>.kicad_sch</strong> ファイルをここにドロップ</p>
          <p>または「開く…」／「サンプル」ボタン</p>
        </div>
      </div>
      <div id="coords" class="coords"></div>
    </div>

    <aside id="sidebar" class="sidebar">
      <div id="sidebarHeader" class="sidebar-header">
        <span class="sheet-handle" aria-hidden="true"></span>
        <span>プロパティ</span>
        <span class="sheet-chevron" aria-hidden="true"></span>
      </div>
      <div id="propContent" class="prop-content">
        <p class="hint">シンボルをクリックして選択すると、ここでプロパティを編集できます。</p>
      </div>
    </aside>
  </main>

  <div id="fieldModal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <span>表示するフィールド</span>
        <button id="fieldsClose" class="btn">✕</button>
      </div>
      <p class="prop-sub field-modal-hint">
        シンボルのプロパティ（参照・値・フットプリント等）ごとに、回路図上への表示・非表示を切り替えます。
        ファイル内のデータや配置には影響しません。
      </p>
      <div id="fieldsList" class="field-list"></div>
      <div class="modal-foot">
        <button id="fieldsAllBtn" class="btn">すべて表示</button>
        <button id="fieldsNoneBtn" class="btn">すべて非表示</button>
        <button id="fieldsResetBtn" class="btn">既定に戻す</button>
      </div>
    </div>
  </div>

  <div id="partModal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <span>部品を選択</span>
        <button id="partClose" class="btn">✕</button>
      </div>
      <div class="part-search-wrap">
        <input id="partSearch" type="text" placeholder="部品名で絞り込み…" autocomplete="off">
      </div>
      <div id="partList" class="part-list"></div>
      <div id="partPreview" class="part-preview" hidden>
        <canvas id="previewCanvas"></canvas>
        <div id="previewTitle" class="preview-title"></div>
        <div id="previewDesc" class="preview-desc"></div>
        <div id="previewMeta" class="preview-meta"></div>
        <div class="preview-actions">
          <button id="previewBack" class="btn">← 一覧に戻る</button>
          <button id="previewPlace" class="btn primary">この部品を配置</button>
        </div>
      </div>
      <div class="modal-foot">
        <button id="stdlibBtn" class="btn">標準ライブラリを読み込む</button>
        <label class="btn" for="symImport">.kicad_sym を取り込む…</label>
        <input id="symImport" type="file" accept=".kicad_sym" hidden>
      </div>
      <p class="prop-sub stdlib-note" id="stdlibNote">
        標準ライブラリ: KiCad Symbol / Footprint Libraries (CC-BY-SA 4.0)
      </p>
    </div>
  </div>

  <datalist id="fpList"></datalist>

  <script src="js/sexpr.js"></script>
  <script src="js/model.js"></script>
  <script src="js/history.js"></script>
  <script src="js/library.js"></script>
  <script src="js/parts.js"></script>
  <script src="js/stdlib.js"></script>
  <script src="js/hershey.js"></script>
  <script src="js/strokefont.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/sample.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline support unavailable */ });
    }
  </script>
</body>
</html>
