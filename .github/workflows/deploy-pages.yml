name: Deploy to GitHub Pages

# Publishes the static schematic viewer/editor to GitHub Pages.
# Uses the "GitHub Actions" Pages source, so it serves straight from this
# branch without needing a separate gh-pages branch.

on:
  push:
    branches:
      - main
      - claude/kicad-sch-viewer-editor-etvajl
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The GitHub mirror of kicad-symbols froze in the KiCad 5 (.lib) era;
      # the live library is on GitLab. Pin a release tag for reproducibility.
      - name: Fetch KiCad symbol libraries
        run: |
          git clone --depth 1 --branch 10.0.4 \
            https://gitlab.com/kicad/libraries/kicad-symbols.git kicad-symbols

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages automatically if it isn't already turned on.
          enablement: true

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html manifest.webmanifest sw.js _site/
          cp -r css js samples icons _site/
          node tools/build-lib-index.js kicad-symbols _site/library
          du -sh _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # The library 404'd on user devices twice despite successful deploys, so
      # verify from here (unrestricted network) what the live site actually
      # serves, and fail loudly if the library never appears.
      - name: Verify deployed site
        run: |
          base="https://satoshimr929-cyber.github.io/kicad"
          code=000
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$base/library/index.json?ci=$i-$RANDOM")
            echo "attempt $i ($(date -u +%T)): library/index.json -> $code"
            [ "$code" = "200" ] && break
            sleep 10
          done
          echo "--- headers: / ---"
          curl -sI "$base/" | sed -n '1,15p'
          echo "--- headers: library/index.json ---"
          curl -sI "$base/library/index.json" | sed -n '1,15p'
          echo "--- headers: library/Device.kicad_sym ---"
          curl -sI "$base/library/Device.kicad_sym" | sed -n '1,15p'
          [ "$code" = "200" ]

      # A user in Japan sees 404 while the runner (US) gets 200. Ask
      # globalping.io for a Tokyo-vantage view of the same URL to tell a bad
      # Fastly POP apart from a problem on the user's own network.
      - name: Probe from Japan vantage
        continue-on-error: true
        run: |
          m=$(curl -s -X POST https://api.globalping.io/v1/measurements \
            -H 'Content-Type: application/json' \
            -d '{"type":"http","target":"satoshimr929-cyber.github.io","limit":3,"locations":[{"country":"JP"}],"measurementOptions":{"protocol":"HTTPS","request":{"path":"/kicad/library/index.json","method":"HEAD"}}}')
          echo "create: $m"
          id=$(echo "$m" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
          sleep 25
          curl -s "https://api.globalping.io/v1/measurements/$id" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(r["probe"].get("city"), r["probe"].get("network"), "->", r["result"].get("statusCode"), {k: v for k, v in (r["result"].get("headers") or {}).items() if k.lower() in ("etag", "age", "x-served-by", "x-cache", "x-github-request-id", "last-modified")}) for r in d.get("results", [])]'
